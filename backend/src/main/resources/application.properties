spring.application.name=university-cyber-system

# MongoDB Configuration
# Default: local MongoDB. Change URI if using MongoDB Atlas or Docker
spring.data.mongodb.uri=mongodb://localhost:27017/university_cyber_db
spring.data.mongodb.database=university_cyber_db

# Server
server.port=8080

# JWT
app.jwt.secret=uniCyberGuardSecretKey2024VeryLongAndSecureJWTSecretKeyForSigning
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.university=DEBUG
logging.level.org.springframework.security=INFO

# Disable Spring Boot auto-close on no web request (important for dev)
spring.main.web-application-type=servlet
